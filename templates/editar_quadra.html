{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <a class="page-back" href="{{ url_for('index') }}">
            <i class="bi bi-arrow-left"></i>
            Casas
        </a>
        <h1 class="page-header-title">Editar quadra</h1>
    </div>
</div>

<form class="form-panel" method="post" style="max-width: 420px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-section-title">
        <i class="bi bi-grid-3x3-gap"></i>
        Dados da quadra
    </div>
    <div class="mb-4">
        <label class="form-label" for="numero_quadra">Número da quadra</label>
        <input class="form-control" id="numero_quadra" name="numero_quadra" type="number" min="1" value="{{ quadra.numero_quadra }}" required>
    </div>

    <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-primary" type="submit">
            <i class="bi bi-check2-circle"></i>
            Salvar alterações
        </button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">
            <i class="bi bi-x-lg"></i>
            Cancelar
        </a>
    </div>
</form>
{% endblock %}
