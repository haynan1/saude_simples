{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <a class="page-back" href="{{ url_for('index') }}">
            <i class="bi bi-arrow-left"></i>
            Casas
        </a>
        <h1 class="page-header-title">Cadastrar quadra</h1>
    </div>
</div>

<form class="form-panel" method="post" style="max-width: 420px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-4">
        <label class="form-label" for="numero_quadra">Número da quadra</label>
        <input class="form-control" id="numero_quadra" name="numero_quadra" type="number" min="1" value="{{ proximo_numero }}" required>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Salvar quadra</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
