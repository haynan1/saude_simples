{% extends "base.html" %}

{% block content %}
<h1 class="h3 mb-3">Cadastrar quadra</h1>

<form class="form-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label class="form-label" for="numero_quadra">Número da quadra</label>
        <input class="form-control" id="numero_quadra" name="numero_quadra" type="number" min="1" value="{{ proximo_numero }}" required>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Salvar quadra</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
