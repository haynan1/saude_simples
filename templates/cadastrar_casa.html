{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <a class="page-back" href="{{ url_for('index') }}">
            <i class="bi bi-arrow-left"></i>
            Casas
        </a>
        <h1 class="page-header-title">Cadastrar casa</h1>
    </div>
</div>

<form class="form-panel" method="post" style="max-width: 560px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label class="form-label" for="quadra_id">Quadra</label>
        <select class="form-select" id="quadra_id" name="quadra_id">
            <option value="">Sem quadra</option>
            {% for quadra in quadras %}
                <option value="{{ quadra.id }}" {% if quadra_id == quadra.id %}selected{% endif %}>Quadra Nº {{ quadra.numero_quadra }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" for="numero_casa">Número da casa</label>
        <input class="form-control" id="numero_casa" name="numero_casa" type="number" min="1" value="{{ numero_casa or proximo_numero }}">
        <div class="form-text">Deixe vazio para usar a próxima numeração disponível.</div>
    </div>

    <div class="mb-4">
        <label class="form-label" for="endereco">Endereço</label>
        <input class="form-control" id="endereco" name="endereco" type="text" value="{{ endereco or '' }}" required>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Salvar casa</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
